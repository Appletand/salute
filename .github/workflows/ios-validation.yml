name: iOS Validation (Salute)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Permite rodar manualmente

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Garante o uso do .NET 10

      - name: Install MAUI Workloads
        run: |
          dotnet workload install ios
          dotnet workload install maui

      - name: Restore Dependencies
        run: dotnet restore Salute/Salute.csproj

      - name: Build iOS (No-Provisioning)
        run: |
          dotnet build Salute/Salute.csproj -f net10.0-ios
            -f net10.0-ios \
            -c Release \
            -p:BuildIpa=false \
            -p:CodesignKey="" \
            -p:CodesignProvision=""