name: iOS Validation (Salute)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15   # Já possui Xcode 26.3+ padrão
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Removemos a etapa manual de Xcode; o runner já usa a versão correta
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Workloads
        run: |
          dotnet workload install ios
          dotnet workload install maui

      - name: Restore & Build iOS
        run: |
          dotnet restore Salute/Salute.csproj
          dotnet build Salute/Salute.csproj -f net10.0-ios -c Release -p:BuildIpa=false -p:CodesignKey="" -p:CodesignProvision=""